<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design 01 | Shakti Art Imitation Jewellery</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins,sans-serif;
background:#0f0f0f;
color:#fff;
}

.hero{
padding:120px 20px 70px;
text-align:center;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url('images/collection2.png') center/cover;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:3rem;
color:#d4af37;
margin-bottom:15px;
}

.hero p{
max-width:700px;
margin:auto;
color:#ddd;
}

.gallery{
padding:80px 5%;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.gallery-item{
overflow:hidden;
border-radius:18px;
background:#181818;
transition:.4s;
cursor:pointer;
}

.gallery-item:hover{
transform:translateY(-8px);
}

.gallery-item img{
width:100%;
height:350px;
object-fit:cover;
display:block;
}

.back-btn{
display:inline-block;
margin-top:30px;
padding:12px 28px;
background:#d4af37;
color:#111;
text-decoration:none;
font-weight:600;
border-radius:30px;
}

.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.9);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.lightbox.active{
display:flex;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:15px;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:40px;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<section class="hero">
<h1>Design 01 Collection</h1>
<p>Premium imitation jewellery collection crafted for retailers and wholesale buyers.</p>

<a href="index.html" class="back-btn">
← Back to Collection
</a>
</section>

<section class="gallery">

<div class="gallery-grid">

<div class="gallery-item">
<img src="design/design2.1.png" alt="">
</div>

<div class="gallery-item">
<img src="design/design2.2.png" alt="">
</div>

<div class="gallery-item">
<img src="design/design2.3.png" alt="">
</div>

<div class="gallery-item">
<img src="design/design2.4.png" alt="">
</div>

<div class="gallery-item">
<img src="design/design2.5.png" alt="">
</div>

</div>

</section>

<div class="lightbox" id="lightbox">
<span class="close">&times;</span>
<img id="lightboxImg">
</div>

<script>
const lightbox=document.getElementById('lightbox');
const lightboxImg=document.getElementById('lightboxImg');

document.querySelectorAll('.gallery-item img').forEach(img=>{
img.addEventListener('click',()=>{
lightbox.classList.add('active');
lightboxImg.src=img.src;
});
});

document.querySelector('.close').addEventListener('click',()=>{
lightbox.classList.remove('active');
});

lightbox.addEventListener('click',(e)=>{
if(e.target===lightbox){
lightbox.classList.remove('active');
}
});
</script>

</body>
</html>
